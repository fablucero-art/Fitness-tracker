<!doctype html><html><head><meta charset=utf-8><meta name=viewport content="width=device-width,initial-scale=1,viewport-fit=cover"><title>Fabian Fitness Tracker v6</title>
<style>
:root{--b:#3f7ee8;--b2:#78aaf9;--bg:#eef3f8;--card:#fff;--t:#223043;--m:#6b7a90;--l:#d8e1ea;--r:#d85c5c;--sh:0 8px 24px #23304316}*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--t);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif}header{background:linear-gradient(135deg,var(--b),var(--b2));color:white;padding:18px 16px 20px;border-radius:0 0 22px 22px;box-shadow:var(--sh)}h1{margin:0;font-size:24px}.small{font-size:12px;color:var(--m)}.tabs{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;padding:10px;position:sticky;top:0;background:#eef3f8e8;backdrop-filter:blur(10px);z-index:5}.tabs button{border:0;border-radius:13px;background:white;padding:10px 4px;color:var(--m);font-weight:800}.tabs button.active{background:var(--b);color:white}.page{display:none;padding:0 12px 80px}.page.active{display:block}.card{background:var(--card);border-radius:20px;padding:15px;margin:10px 0 12px;box-shadow:var(--sh)}h2{font-size:18px;margin:0 0 12px}h3{font-size:16px;margin:0 0 8px}.g2{display:grid;grid-template-columns:1fr 1fr;gap:10px}.kpi{background:#e7f0ff;border-radius:18px;padding:12px}.num{font-size:23px;font-weight:900}.bar{height:10px;background:#dfe8f2;border-radius:999px;overflow:hidden;margin-top:7px}.fill{height:100%;background:var(--b);width:0}button{font-family:inherit}.act{border:0;border-radius:14px;background:var(--b);color:white;padding:12px 14px;font-weight:900;font-size:15px}.sec{background:#e7f0ff;color:var(--b)}.dan{background:#fff0f0;color:var(--r)}.full{width:100%}input,select,textarea{width:100%;padding:12px;margin:5px 0 10px;border:1px solid var(--l);border-radius:13px;background:#fbfdff;color:var(--t);font-size:16px}label{font-size:12px;font-weight:800;color:var(--m)}.meal{display:flex;align-items:center;justify-content:space-between;border-top:1px solid var(--l);padding:12px 0}.meal:first-child{border-top:0}.sub{font-size:13px;color:var(--m);line-height:1.35}.pill{display:inline-block;border-radius:999px;padding:4px 8px;background:#e7f0ff;color:var(--b);font-size:12px;font-weight:900;margin:2px 4px 2px 0}.item{border-top:1px solid var(--l);padding:10px 0}.item:first-child{border-top:0}.ttl{font-weight:900}.row{display:flex;gap:8px;margin-top:8px;flex-wrap:wrap}.row button{flex:1}.res{padding:12px;border-top:1px solid var(--l)}.res:first-child{border-top:0}.plus{border:0;background:#e7f0ff;color:var(--b);border-radius:50%;font-size:24px;width:44px;height:44px}.modal{position:fixed;inset:0;background:var(--bg);z-index:20;display:none;overflow:auto}.modal.show{display:block}.top{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;background:#fff;position:sticky;top:0;z-index:21;box-shadow:var(--sh)}.back{border:0;background:#e7f0ff;color:var(--b);border-radius:50%;width:44px;height:44px;font-size:24px}.set{display:grid;grid-template-columns:42px 1fr 1fr 44px;gap:8px;align-items:center;margin:6px 0}.hidden{display:none}
</style></head><body>
<header><h1>Today</h1><div class=small style=color:white>Food diary + workouts</div></header>
<nav class=tabs><button class=active onclick="tab('today',this)">Today</button><button onclick="tab('workout',this)">Workout</button><button onclick="tab('history',this)">History</button><button onclick="tab('settings',this)">Settings</button></nav>

<main id=today class="page active">
<section class=card><label>Date</label><input id=activeDate type=date onchange=render()><div class=g2><div class=kpi><div>Calories</div><div id=kcal class=num>0</div><div class=bar><div id=calFill class=fill></div></div><div id=calTxt class=small></div></div><div class=kpi><div>Protein</div><div id=prot class=num>0g</div><div class=bar><div id=proFill class=fill></div></div><div id=proTxt class=small></div></div></div></section>
<section class=card><h2>Diary</h2><div id=meals></div></section>
</main>

<main id=workout class=page><section class=card><h2 id=wTitle>Add Exercise</h2><input id=editW type=hidden><label>Date</label><input id=wDate type=date><label>Routine</label><input id=routine placeholder="Day 1, Push, Pull"><label>Exercise</label><input id=exercise oninput=lastHint() placeholder="Bench Press"><div id=hint class=small></div><div id=sets></div><button class="act sec full" onclick=addSet()>+ Add Set</button><label>Notes</label><textarea id=notes></textarea><button class="act full" onclick=saveWorkout()>Save Exercise</button><button id=cancelW class="act sec full hidden" onclick=resetWorkout()>Cancel Edit</button></section><section class=card><h2>Workout Log</h2><div id=wLog></div></section></main>
<main id=history class=page><section class=card><h2>History</h2><label>Date</label><input id=hDate type=date onchange=renderHistory()></section><section class=card><h3>Food</h3><div id=hFood></div></section><section class=card><h3>Workout</h3><div id=hWork></div></section></main>
<main id=settings class=page><section class=card><h2>Goals</h2><label>Daily calories</label><input id=gCal type=number><label>Daily protein</label><input id=gPro type=number><button class="act full" onclick=saveSettings()>Save Goals</button></section><section class=card><h2>Backup</h2><button class="act sec full" onclick=exportData()>Export Backup</button><label>Import Backup JSON</label><input type=file accept=application/json onchange=importData(event)><button class="act dan full" onclick=clearAll()>Clear All Data</button></section></main>

<div id=searchModal class=modal><div class=top><button class=back onclick=closeSearch()>‹</button><b id=searchTitle>Add Food</b><span></span></div><div style="padding:12px"><input id=searchBox placeholder="Search foods, brands..." oninput=localSearch()><div class=g2><button class="act sec" onclick=localSearch()>Saved</button><button class=act onclick=onlineSearch()>Online</button></div><div id=results class=card></div></div></div>

<div id=detailModal class=modal><div class=top><button class=back onclick=closeDetail()>‹</button><b>Add Food</b><button class="act sec" onclick=logSelected()>Log</button></div><div style="padding:12px"><section class=card><h2 id=dName>Food</h2><div id=dBrand class=sub></div><label>Serving Size</label><select id=dServing onchange=calcDetail()></select><label>Number of Servings</label><input id=dServings type=number inputmode=decimal value=1 oninput=calcDetail()><label>Meal</label><select id=dMeal><option>Breakfast</option><option>Lunch</option><option>Dinner</option><option>Snacks</option></select><div class=g2><div class=kpi><div class=num id=dCal>0</div><div class=small>calories</div></div><div class=kpi><div class=num id=dPro>0g</div><div class=small>protein</div></div></div><p id=dMacros class=sub></p></section></div></div>

<script>
const today=()=>new Date().toISOString().slice(0,10),id=()=>crypto.randomUUID?crypto.randomUUID():Date.now()+""+Math.random(),n=v=>Number(v)||0,e=s=>String(s??"").replace(/[&<>"']/g,m=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#039;"}[m])),mealsA=["Breakfast","Lunch","Dinner","Snacks"];
let built=[
{name:"Green Apple - Small",brand:"Apple",servings:[{label:"1 - Raw",ratio:1}],cal:78,pro:.4,carb:21,fat:.5},
{name:"Chicken breast, cooked",brand:"Generic",servings:[{label:"1 oz",ratio:1},{label:"28 g",ratio:1},{label:"3 oz",ratio:3}],cal:47,pro:8.8,carb:0,fat:1},
{name:"Turkey breast deli meat",brand:"Generic",servings:[{label:"2 oz",ratio:1},{label:"56 g",ratio:1},{label:"1 oz",ratio:.5}],cal:60,pro:12,carb:1,fat:1},
{name:"Egg, large",brand:"Generic",servings:[{label:"1 egg",ratio:1},{label:"2 eggs",ratio:2}],cal:72,pro:6.3,carb:.4,fat:4.8},
{name:"Banana, medium",brand:"Generic",servings:[{label:"1 medium",ratio:1}],cal:105,pro:1.3,carb:27,fat:.4},
{name:"White rice, cooked",brand:"Generic",servings:[{label:"100 g",ratio:1},{label:"1 cup",ratio:1.58}],cal:130,pro:2.7,carb:28,fat:.3}
].map(x=>({...x,id:id()}));
let S=JSON.parse(localStorage.fabianTrackerV6||"null");if(!S){let O=JSON.parse(localStorage.fabianTrackerV5||"null")||JSON.parse(localStorage.fabianTrackerV4||"null")||{};S={foods:O.foods||[],workouts:O.workouts||[],templates:[...built,...(O.templates||[])],settings:{cal:O.settings?.cal||2300,pro:O.settings?.pro||180}}}
let currentMeal="Breakfast", selected=null;
function persist(){localStorage.fabianTrackerV6=JSON.stringify(S);render()}
function tab(x,b){document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));document.querySelectorAll(".tabs button").forEach(y=>y.classList.remove("active"));document.getElementById(x).classList.add("active");b.classList.add("active");render()}
function vDate(){return activeDate.value||today()}function byD(d){return x=>x.date===d}
function openSearch(meal){currentMeal=meal;searchTitle.textContent=meal;searchBox.value="";results.innerHTML="<p class=small>Search saved foods or online.</p>";searchModal.classList.add("show")}
function closeSearch(){searchModal.classList.remove("show")}
function closeDetail(){detailModal.classList.remove("show")}
function allT(){let m=new Map;[...built,...S.templates].forEach(f=>m.set((f.name+f.brand).toLowerCase(),f));return[...m.values()]}
function localSearch(){let q=searchBox.value.toLowerCase().trim();if(!q){results.innerHTML="<p class=small>Start typing to search.</p>";return}let r=allT().filter(f=>(f.name+" "+(f.brand||"")).toLowerCase().includes(q)).slice(0,12);results.innerHTML=r.length?r.map(resHTML).join(""):"<p class=small>No saved match. Try Online.</p>"}
function resHTML(f){return `<div class=res onclick="openDetail('${f.id}')"><div class=ttl>${e(f.name)}</div><div class=sub>${Math.round(f.cal)} cal, ${e(f.servings?.[0]?.label||"1 serving")}${f.brand?", "+e(f.brand):""}</div></div>`}
async function onlineSearch(){let q=searchBox.value.trim();if(!q)return;results.innerHTML="<p class=small>Searching online...</p>";try{let R=await fetch("https://world.openfoodfacts.org/cgi/search.pl?search_terms="+encodeURIComponent(q)+"&search_simple=1&action=process&json=1&page_size=10"),D=await R.json();let temp=(D.products||[]).map(p=>{let u=p.nutriments||{};return{id:id(),name:p.product_name||p.generic_name||"Unnamed food",brand:p.brands||"",servings:[{label:p.serving_size||"100 g",ratio:1},{label:"100 g",ratio:1}],cal:Math.round(u["energy-kcal_serving"]||u["energy-kcal_100g"]||0),pro:Math.round((u.proteins_serving||u.proteins_100g||0)*10)/10,carb:Math.round((u.carbohydrates_serving||u.carbohydrates_100g||0)*10)/10,fat:Math.round((u.fat_serving||u.fat_100g||0)*10)/10}}).filter(f=>f.name&&f.cal+f.pro+f.carb+f.fat>0);S.temp=temp;results.innerHTML=temp.length?temp.map(resHTML).join(""):"<p class=small>No online results.</p>"}catch(err){results.innerHTML="<p class=small>Online search failed.</p>"}}
function openDetail(fid){selected=allT().find(f=>f.id==fid)||(S.temp||[]).find(f=>f.id==fid);if(!selected)return;if((S.temp||[]).find(f=>f.id==fid))S.templates.push(selected);dName.textContent=selected.name;dBrand.textContent=selected.brand||"";dMeal.value=currentMeal;dServings.value=1;dServing.innerHTML=(selected.servings||[{label:"1 serving",ratio:1}]).map((s,i)=>`<option value="${i}">${e(s.label)}</option>`).join("");calcDetail();detailModal.classList.add("show")}
function calcDetail(){if(!selected)return;let s=(selected.servings||[{ratio:1}])[n(dServing.value)]||{ratio:1},mult=(n(dServings.value)||1)*(s.ratio||1);dCal.textContent=Math.round(selected.cal*mult);dPro.textContent=Math.round(selected.pro*mult*10)/10+"g";dMacros.textContent=`Carbs ${Math.round(selected.carb*mult*10)/10}g • Fat ${Math.round(selected.fat*mult*10)/10}g`}
function logSelected(){if(!selected)return;let s=(selected.servings||[{label:"1 serving",ratio:1}])[n(dServing.value)],mult=(n(dServings.value)||1)*(s.ratio||1);S.foods.push({id:id(),date:vDate(),meal:dMeal.value,name:selected.name,brand:selected.brand||"",serving:s.label,servings:n(dServings.value)||1,cal:Math.round(selected.cal*mult),protein:Math.round(selected.pro*mult*10)/10,carbs:Math.round(selected.carb*mult*10)/10,fat:Math.round(selected.fat*mult*10)/10});closeDetail();closeSearch();persist()}
function delF(fid){if(confirm("Delete this food?")){S.foods=S.foods.filter(f=>f.id!=fid);persist()}}
function mealHTML(meal){let L=S.foods.filter(f=>f.date==vDate()&&f.meal==meal),cal=L.reduce((a,b)=>a+n(b.cal),0),pro=L.reduce((a,b)=>a+n(b.protein),0);return `<div class=meal><div><h3>${meal}</h3><div class=sub>${Math.round(cal)} cal • ${Math.round(pro*10)/10}g protein</div></div><button class="act sec" onclick="openSearch('${meal}')">Log</button></div>${L.map(f=>`<div class=item><div class=ttl>${e(f.name)}</div><div class=sub>${f.servings} × ${e(f.serving)} • ${f.cal} cal • ${f.protein}g protein</div><div class=row><button class="act dan" onclick="delF('${f.id}')">Delete</button></div></div>`).join("")}`}
function addSet(w="",r=""){let d=document.createElement("div");d.className="set";let i=sets.children.length+1;d.innerHTML=`<b>Set ${i}</b><input class=sw type=number placeholder=Weight value="${w}"><input class=sr type=number placeholder=Reps value="${r}"><button class="act dan" onclick="this.parentElement.remove()">×</button>`;sets.appendChild(d)}
function getSets(){return[...sets.children].map(x=>({weight:n(x.querySelector(".sw").value),reps:n(x.querySelector(".sr").value)})).filter(x=>x.weight||x.reps)}
function lastHint(){let x=exercise.value.toLowerCase().trim(),l=[...S.workouts].reverse().find(w=>w.exercise?.toLowerCase()==x);hint.innerHTML=l?`Last time: ${l.sets.map((s,i)=>`Set ${i+1}: ${s.weight}×${s.reps}`).join(" • ")}`:""}
function saveWorkout(){let wid=editW.value,W={id:wid||id(),date:wDate.value||vDate(),routine:routine.value||"Workout",exercise:exercise.value||"Exercise",notes:notes.value,sets:getSets().length?getSets():[{weight:0,reps:0}]};wid?S.workouts=S.workouts.map(x=>x.id==wid?W:x):S.workouts.push(W);resetWorkout();persist()}
function resetWorkout(){editW.value="";wDate.value=vDate();routine.value=exercise.value=notes.value=hint.innerHTML="";sets.innerHTML="";addSet()}
function delW(wid){S.workouts=S.workouts.filter(w=>w.id!=wid);persist()}function vol(w){return(w.sets||[]).reduce((a,s)=>a+n(s.weight)*n(s.reps),0)}
function workoutList(L,T){T.innerHTML=L.length?L.slice().reverse().map(w=>`<div class=item><div class=ttl>${e(w.exercise)}</div><div class=sub>${e(w.routine)} • ${w.sets.length} sets • ${Math.round(vol(w))} lb volume</div>${w.sets.map((s,i)=>`<div class=sub>Set ${i+1}: ${s.weight} × ${s.reps}</div>`).join("")}<div class=row><button class="act dan" onclick="delW('${w.id}')">Delete</button></div></div>`).join(""):"<p class=small>No workout logged.</p>"}
function renderHistory(){let d=hDate.value||vDate();let F=S.foods.filter(byD(d));hFood.innerHTML=F.length?F.map(f=>`<div class=item><div class=ttl>${e(f.meal)} — ${e(f.name)}</div><div class=sub>${f.cal} cal • ${f.protein}g protein</div></div>`).join(""):"<p class=small>No food logged.</p>";workoutList(S.workouts.filter(byD(d)),hWork)}
function saveSettings(){S.settings.cal=n(gCal.value)||2300;S.settings.pro=n(gPro.value)||180;persist()}
function render(){if(!activeDate.value)activeDate.value=today();if(!wDate.value)wDate.value=vDate();if(!hDate.value)hDate.value=vDate();gCal.value=S.settings.cal;gPro.value=S.settings.pro;let F=S.foods.filter(byD(vDate())),W=S.workouts.filter(byD(vDate())),C=F.reduce((a,b)=>a+n(b.cal),0),P=F.reduce((a,b)=>a+n(b.protein),0);kcal.textContent=Math.round(C);prot.textContent=Math.round(P)+"g";calTxt.textContent=`${Math.round(C)} / ${S.settings.cal} cal`;proTxt.textContent=`${Math.round(P)} / ${S.settings.pro}g`;calFill.style.width=Math.min(100,C/S.settings.cal*100)+"%";proFill.style.width=Math.min(100,P/S.settings.pro*100)+"%";meals.innerHTML=mealsA.map(mealHTML).join("");workoutList(W,wLog);renderHistory()}
function exportData(){let blob=new Blob([JSON.stringify(S,null,2)],{type:"application/json"}),a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download=`fitness-tracker-backup-${today()}.json`;a.click()}
function importData(ev){let f=ev.target.files[0];if(!f)return;let r=new FileReader;r.onload=()=>{try{S=JSON.parse(r.result);persist();alert("Backup imported.")}catch(e){alert("Could not import file.")}};r.readAsText(f)}
function clearAll(){if(confirm("Clear all data?")){localStorage.removeItem("fabianTrackerV6");location.reload()}}
resetWorkout();render();
</script></body></html>
